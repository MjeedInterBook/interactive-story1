<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المشهد الثالث</title>

<style>

body{
    margin:0;
    background:#000;
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Tahoma,Arial,sans-serif;
}

h1{
    margin:20px;
    text-align:center;
}

video{
    width:95%;
    max-width:700px;
    border-radius:12px;
    background:#000;
}

#back{
    display:none;
    margin-top:20px;
    padding:14px 30px;
    background:#d8b15b;
    color:#000;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
    border-radius:10px;
}

#back:hover{
    background:#f2c96d;
}

</style>

</head>

<body>

<h1>📖 المشهد الثالث</h1>

<video id="video" controls autoplay>
    <source src="Scene3.mp4" type="video/mp4">
    متصفحك لا يدعم تشغيل الفيديو.
</video>

<a id="back" href="index.html">
🏁 إنهاء القصة والعودة للكتاب
</a>

<script>

const video = document.getElementById("video");
const back = document.getElementById("back");

video.onended = function () {
    back.style.display = "inline-block";
};

</script>

</body>
</html>
