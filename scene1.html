<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المشهد الأول</title>

<style>

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

h1{
    margin:20px;
    text-align:center;
}

video{
    width:95%;
    max-width:700px;
    border-radius:12px;
    background:#000;
}

#backBtn{
    display:none;
    margin-top:20px;
    padding:14px 28px;
    font-size:20px;
    font-weight:bold;
    background:#d8b15b;
    color:#000;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#backBtn:hover{
    background:#f2c96d;
}

</style>

</head>

<body>

<h1>📖 المشهد الأول</h1>
<div style="padding:20px;line-height:2;text-align:justify;">
كانت الساعة تقترب من منتصف الليل عندما توقفت سيارة سامر أمام مبنى قديم مهجور على أطراف المدينة. لم يكن يؤمن بالخرافات، لكنه كان يؤمن بالفضول.

دخل المبنى وهو يسلط ضوء مصباحه بين الممرات الطويلة، حتى وصل إلى باب يحمل الرقم 7.

اقترب ولمس المقبض...

ثم دفع الباب ببطء.
</div>
<video id="video" controls autoplay>
    <source src="Scene1.mp4" type="video/mp4">
    متصفحك لا يدعم تشغيل الفيديو.
</video>

<button id="backBtn" onclick="window.location.href='scene2.html'">
▶ التالي: المشهد الثاني
</button>

<script>

const video = document.getElementById("video");
const btn = document.getElementById("backBtn");

video.onended = function () {
    btn.style.display = "block";
};

</script>

</body>
</html>
