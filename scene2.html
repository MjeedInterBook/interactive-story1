<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المشهد الثاني</title>

<style>

body{
margin:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Tahoma,Arial,sans-serif;
overflow:hidden;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}

#back{
display:none;
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
padding:14px 30px;
background:#d8b15b;
color:#000;
text-decoration:none;
font-size:20px;
font-weight:bold;
border-radius:10px;
}

</style>

</head>

<body>

<video id="video" controls autoplay>

<source src="Scene2.mp4" type="video/mp4">

</video>

<a id="back" href="scene2.html">

📖 العودة إلى القصة

</a>

<script>

const video=document.getElementById("video");
const back=document.getElementById("back");

video.onended=function(){
back.style.display="block";
};

</script>

</body>
</html>
