<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الباب رقم 7</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Tahoma,Arial,sans-serif;

height:100vh;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

background:#000;

background-image:

linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.70)),

url("cover.jpg");

background-size:cover;

background-position:center;

background-repeat:no-repeat;

}

.container{

width:100%;

max-width:900px;

padding:35px;

text-align:center;

color:white;

backdrop-filter:blur(3px);

}

.frame{

border:2px solid rgba(216,177,91,.85);

border-radius:18px;

padding:40px 25px;

background:rgba(0,0,0,.30);

box-shadow:0 0 40px rgba(0,0,0,.55);

animation:fadeIn 2s ease;

}

.logo{

font-size:22px;

letter-spacing:3px;

color:#d8b15b;

margin-bottom:18px;

}

h1{

font-size:60px;

margin-bottom:12px;

color:#fff;

text-shadow:0 0 18px rgba(255,255,255,.25);

}

.subtitle{

font-size:24px;

color:#d8b15b;

margin-bottom:35px;

}

.author{

font-size:22px;

line-height:2;

margin-top:10px;

margin-bottom:35px;

}

.author span{

display:block;

font-size:18px;

opacity:.85;

color:#d8b15b;

}

.start-btn{

display:inline-block;

margin-top:20px;

padding:18px 55px;

font-size:24px;

font-weight:bold;

color:#000;

background:#d8b15b;

border-radius:12px;

text-decoration:none;

transition:.35s;

box-shadow:0 0 25px rgba(216,177,91,.45);

}

.start-btn:hover{

transform:scale(1.05);

background:#f0c96f;

box-shadow:0 0 35px rgba(216,177,91,.8);

}

.note{

margin-top:35px;

font-size:15px;

color:#d0d0d0;

opacity:.8;

}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="container">

<div class="frame">

<div class="logo">

INTERACTIVE STORY

</div>

<h1>

الباب رقم 7

</h1>

<div class="subtitle">

كتاب تفاعلي

</div>

<div class="author">

<span>تأليف</span>

عبدالمجيد بن حسن الوصابي

</div>

<a class="start-btn" href="story.html">

ابدأ القصة

</a>

<div class="note">

الإصدار 1.0

</div>

</div>

</div>

</body>

</html>
